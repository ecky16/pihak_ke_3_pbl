<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxeAkZl8kgM9KYATer4C53fb3LsUuwa__RE7fpdDnkXOz6nR2TTsH2F8_LjvBUyOTCEwQ/exec';

    let map = L.map('map').setView([-7.2575, 112.7521], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© maz_e_q' }).addTo(map);

    let allData = [];
    let currentSheetName = "DATA";
    let polylineGroup = L.featureGroup().addTo(map);
    let markerGroup = L.featureGroup().addTo(map);
    let gamasGroup = L.featureGroup().addTo(map); // <--- LAYER KHUSUS GAMAS

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    // --- FUNGSI AMBIL DATA (DATA TEKNISI + DATA GAMAS) ---
    async function fetchData() {
        const tanggalInput = document.getElementById('selectTanggal').value;
        const sekarang = new Date();
        currentSheetName = "DATA"; 

        if (tanggalInput) {
            const dateSel = new Date(tanggalInput);
            if (dateSel.getMonth() !== sekarang.getMonth() || dateSel.getFullYear() !== sekarang.getFullYear()) {
                const namaBulan = ["January", "February", "March", "April", "May", "June", 
                                   "July", "August", "September", "October", "November", "December"];
                currentSheetName = `DATA_${namaBulan[dateSel.getMonth()]}_${dateSel.getFullYear()}`;
            }
        }

        try {
            // 1. Ambil Data Tracking Teknisi
            const response = await fetch(`${GAS_URL}?sheetName=${currentSheetName}`);
            allData = await response.json();
            
            // 2. Ambil Data Gamas
            await fetchGamasData();

            const select = document.getElementById('selectTeknisi');
            const valSebelumnya = select.value;
            const daftarNama = [...new Set(allData.map(item => item.Nama))].filter(n => n && n !== "Unknown");
            
            select.innerHTML = '<option value="">-- Semua Teknisi --</option>';
            daftarNama.forEach(nama => {
                const opt = document.createElement('option');
                opt.value = nama; opt.innerHTML = nama;
                select.appendChild(opt);
            });
            
            select.value = valSebelumnya;
            renderMaps();
        } catch (e) { 
            console.error("Error:", e); 
            allData = [];
            renderMaps();
        }
    }

    // --- FUNGSI TAMPILKAN TITIK GAMAS ---
    async function fetchGamasData() {
        try {
            const res = await fetch(`${GAS_URL}?sheetName=db_gamas`);
            const gamasData = await res.json();
            gamasGroup.clearLayers();

            gamasData.forEach(g => {
                if (g.Lat && g.Lon && g.Lat != 0) {
                    // Pakai Emoji Api atau Tanda Seru
                    const iconGamas = L.divIcon({
                        html: '<div style="font-size: 24px; filter: drop-shadow(0 0 5px red);">🔥</div>',
                        className: 'gamas-marker',
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    });

                    L.marker([g.Lat, g.Lon], {icon: iconGamas})
                     .addTo(gamasGroup)
                     .bindPopup(`
                        <div style="text-align:center; min-width:150px;">
                            <b style="color:red; font-size:14px;">⚠️ SEJARAH GAMAS</b><br>
                            <hr style="margin: 5px 0;">
                            <b>Tiket:</b> ${g.Tiket}<br>
                            <b>Definisi:</b> ${g.Definisi}<br>
                            <b>Penyebab:</b> ${g.Penyebab}<br>
                            <small>${g.Tanggal}</small><br>
                            <p style="font-size:11px; color:#666;">${g.Keterangan}</p>
                            <a href="${g.Link_Evidence}" target="_blank" class="btn-view" style="background:red;">📂 Lihat Evidence</a>
                        </div>
                     `);
                }
            });
        } catch (e) { console.error("Gamas Error:", e); }
    }

    function renderMaps() {
        const teknisiSel = document.getElementById('selectTeknisi').value;
        const tanggalSel = document.getElementById('selectTanggal').value;
        const sekarang = new Date();

        polylineGroup.clearLayers();
        markerGroup.clearLayers();

        let filtered = allData;
        if (teknisiSel) filtered = filtered.filter(d => d.Nama === teknisiSel);
        if (tanggalSel) {
            filtered = filtered.filter(d => new Date(d.Timestamp).toISOString().split('T')[0] === tanggalSel);
        }

        let totalLaporan = 0;
        let totalJarak = 0;
        let waktuTerakhir = null;
        let ketTerakhir = "";
        const perUser = {};

        filtered.forEach((d, i) => {
            const tglData = new Date(d.Timestamp);
            if (!waktuTerakhir || tglData > waktuTerakhir) {
                waktuTerakhir = tglData;
                ketTerakhir = d.Keterangan;
            }

            if (d.Photo_URL && d.Photo_URL.includes('t.me/c/')) {
                totalLaporan++;
                let lat = d.Latitude, lon = d.Longitude;
                if (!lat || lat == 0) {
                    const lastPos = filtered.slice(0, i).reverse().find(r => r.Nama === d.Nama && r.Latitude != 0);
                    if (lastPos) { lat = lastPos.Latitude; lon = lastPos.Longitude; }
                }
                if (lat && lat != 0) {
                    const popupMsg = `<div style="text-align:center"><b>Temuan ${d.Nama}</b><br><small>${new Date(d.Timestamp).toLocaleTimeString()}</small><br><p style="margin:5px 0">${d.Keterangan}</p><a href="${d.Photo_URL}" target="_blank" class="btn-view">📂 Buka di Telegram</a></div>`;
                    L.marker([lat, lon]).addTo(markerGroup).bindPopup(popupMsg, {className: 'custom-popup'});
                }
            }

            if (d.Latitude && d.Longitude && d.Latitude != 0) {
                if (!perUser[d.Nama]) perUser[d.Nama] = [];
                perUser[d.Nama].push([d.Latitude, d.Longitude]);
            }
        });

        Object.keys(perUser).forEach(nama => {
            const coords = perUser[nama];
            if (coords.length > 1) {
                const color = teknisiSel ? '#0084ff' : '#999';
                L.polyline(coords, {color: color, weight: 4, opacity: 0.7}).addTo(polylineGroup);
                for (let j = 1; j < coords.length; j++) {
                    totalJarak += calculateDistance(coords[j-1][0], coords[j-1][1], coords[j][0], coords[j][1]);
                }
            }
        });

        // Update Statistik dan Status GPS (Logic Mas yang lama tetap terjaga)
        const distElem = document.getElementById('jarakTempuh');
        let statusHtml = "";
        if (teknisiSel && waktuTerakhir && currentSheetName === "DATA") {
            const selisihMenit = Math.floor((sekarang - waktuTerakhir) / 60000);
            const isSudahOff = ketTerakhir.includes("Selesai") || ketTerakhir.includes("OFF");
            if (!isSudahOff && selisihMenit >= 5) {
                distElem.classList.add('status-offline');
                statusHtml = `<span class="warning-text">⚠️ GPS MACET ${selisihMenit} MENIT</span>`;
            } else if (isSudahOff) {
                distElem.classList.remove('status-offline');
                statusHtml = `<span class="off-text">💤 SURVEY SELESAI / OFF</span>`;
            } else {
                distElem.classList.remove('status-offline');
                statusHtml = `<span class="success-text">✅ GPS AKTIF</span>`;
            }
        } else {
            distElem.classList.remove('status-offline');
            if (currentSheetName !== "DATA") statusHtml = `<span style="color:blue; font-size:10px;">📚 DATA ARSIP</span>`;
        }

        distElem.innerHTML = `<div>📍 ${totalJarak.toFixed(2)} KM</div> ${statusHtml}`;
        document.getElementById('totalLaporan').innerHTML = `<div>📸 ${totalLaporan} Foto</div>`;
        
        if (filtered.length > 0) {
            const combinedBounds = L.featureGroup([polylineGroup, markerGroup]).getBounds();
            if (combinedBounds.isValid()) map.fitBounds(combinedBounds, {padding: [50, 50]});
        }
    }

    fetchData();
    setInterval(() => {
        if (currentSheetName === "DATA") fetchData();
    }, 60000); 
</script>
