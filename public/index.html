<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Data Pelanggan</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-primary { background: #28a745; border: none; padding: 12px; font-weight: bold; }
        .btn-primary:hover { background: #218838; }
        .status-gps { font-size: 0.8rem; color: #666; margin-bottom: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card p-4 w-100" style="max-width: 500px;">
            <h3 id="main-header" class="text-center mb-4" style="color: #28a745;">INPUT DATA BONEXNET</h3>
            
            <div class="mb-3">
                <label class="form-label">Nama Lengkap</label>
                <input type="text" id="nama" class="form-control" placeholder="Nama Pelanggan">
            </div>

            <div class="mb-3">
                <label class="form-label">Alamat</label>
                <textarea id="alamat" class="form-control" rows="2" placeholder="Alamat lengkap..."></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">No HP / WhatsApp</label>
                <input type="text" inputmode="numeric" id="hp" class="form-control" placeholder="08xxx">
            </div>

            <div class="mb-3">
                <label class="form-label">No KTP (16 Digit)</label>
                <input type="text" inputmode="numeric" id="ktp" class="form-control" placeholder="Ketik 16 digit no KTP">
            </div>

            <div class="mb-3">
                <label class="form-label">Foto KTP</label>
                <input type="file" id="foto_ktp" class="form-control" accept="image/*">
            </div>

            <div class="mb-3">
                <label class="form-label">Foto Depan Rumah</label>
                <input type="file" id="foto_rumah" class="form-control" accept="image/*" multiple>
            </div>
            
            <div id="gps-info" class="status-gps" onclick="ambilLokasi()">📍 Menunggu izin lokasi (Klik untuk refresh)...</div>

            <button class="btn btn-primary w-100" id="btnKirim" onclick="prosesData()">KIRIM SEKARANG</button>
        </div>
    </div>

    <script>
        // --- 1. SETTING BRAND & JUDUL ---
        const path = window.location.pathname; 
        const params = new URLSearchParams(window.location.search);
        const brandParam = params.get('brand'); 
        let brandName = "BONEXNET"; // Default

        if (brandParam === 'gumuknet' || path.includes('gumuknet')) {
            brandName = "GUMUKNET";
            document.getElementById('main-header').innerText = "INPUT DATA GUMUKNET";
            document.getElementById('main-header').style.color = "#007bff";
            document.title = "Input Data GumukNet";
        } else {
            document.getElementById('main-header').innerText = "INPUT DATA BONEXNET";
        }

        // --- 2. AMBIL LOKASI GPS ---
        let koordinat = "Mencari...";

        function ambilLokasi() {
            const statusGps = document.getElementById('gps-info');
            statusGps.innerText = "📍 Sedang mencari lokasi (Klik untuk refresh)...";
            statusGps.style.color = "#666";

            const options = {
                enableHighAccuracy: true, 
                timeout: 10000,           
                maximumAge: 0             
            };

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (p) => { 
                        koordinat = `${p.coords.latitude},${p.coords.longitude}`;
                        statusGps.innerText = "✅ Lokasi Terkunci: " + koordinat;
                        statusGps.style.color = "green";
                    },
                    (err) => { 
                        let pesan = "Gagal ambil lokasi.";
                        if(err.code == 1) pesan = "❌ Izin lokasi ditolak browser.";
                        if(err.code == 2) pesan = "❌ GPS tidak terdeteksi/lemah.";
                        if(err.code == 3) pesan = "❌ Waktu pencarian lokasi habis.";
                        
                        statusGps.innerText = pesan + " Klik untuk coba lagi.";
                        statusGps.style.color = "red";
                    }, 
                    options
                );
            } else {
                statusGps.innerText = "❌ Browser tidak mendukung GPS.";
            }
        }

        // --- 3. PROSES KIRIM DATA ---
        async function prosesData() {
            const btn = document.getElementById('btnKirim');
            const fileKtp = document.getElementById('foto_ktp').files[0];
            const filesRumah = document.getElementById('foto_rumah').files;
            
            // --- VALIDASI DENGAN SWEETALERT ---
            if(!fileKtp) {
                return Swal.fire('Oops...', 'Foto KTP wajib diupload!', 'warning');
            }
            if(filesRumah.length === 0) {
                return Swal.fire('Oops...', 'Foto rumah minimal 1!', 'warning');
            }
            if(!koordinat.includes(",")) {
                return Swal.fire('Tunggu!', 'Titik lokasi GPS belum terkunci. Pastikan GPS aktif atau klik tulisan "Menunggu izin lokasi".', 'info');
            }

            btn.disabled = true;
            btn.innerText = "Sedang Mengupload...";

            // Helper Fungsi Base64 yang sempat hilang
            const getBase64 = (file) => new Promise(r => {
                const reader = new FileReader();
                reader.onload = () => r({ base64: reader.result.split(',')[1], mimeType: file.type });
                reader.readAsDataURL(file);
            });

            try {
                const dataKtp = await getBase64(fileKtp);
                const imagesRumah = [];
                for (let f of filesRumah) {
                    imagesRumah.push(await getBase64(f));
                }

                const payload = {
                    brand: brandName, 
                    nama: document.getElementById('nama').value,
                    alamat: document.getElementById('alamat').value,
                    no_hp: document.getElementById('hp').value,
                    no_ktp: document.getElementById('ktp').value,
                    lokasi: koordinat,
                    foto_ktp: dataKtp,
                    images_rumah: imagesRumah
                };

                const URL_GAS = "https://script.google.com/macros/s/AKfycbyBD4YkuvZCYIRFBlaSbHXz7YAEVZOFypnb6QOmlDyycqUQMeReN6cwgpjgOwU8UX0b4Q/exec";

                await fetch(URL_GAS, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload)
                });

                // Sukses Alert
                Swal.fire({
                    title: 'Berhasil!',
                    text: `INPUT DATA PELANGGAN ${brandName} BERHASIL`,
                    icon: 'success',
                    confirmButtonColor: '#28a745'
                }).then(() => {
                    location.reload(); 
                });

            } catch (e) {
                Swal.fire('Error!', 'Gagal mengirim data: ' + e.message, 'error');
                btn.disabled = false;
                btn.innerText = "KIRIM SEKARANG";
            }
        }

        window.onload = ambilLokasi;
    </script>
</body>
</html>
