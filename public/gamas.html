<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor Gamas</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #999; }
        #status { font-size: 12px; color: blue; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <h3>⚠️ Input Data Gamas</h3>
    <div class="form-group">
        <label>Tanggal Gamas</label>
        <input type="date" id="tanggal">
    </div>
    <div class="form-group">
        <label>Nomor Tiket</label>
        <input type="text" id="tiket" placeholder="Contoh: IN123456">
    </div>
    <div class="form-group">
        <label>Definisi Gamas</label>
        <select id="definisi">
            <option value="ODP">ODP</option>
            <option value="DISTRIBUSI">DISTRIBUSI</option>
            <option value="FEEDER">FEEDER</option>
        </select>
    </div>
    <div class="form-group">
        <label>Penyebab Gamas</label>
        <input type="text" id="penyebab" placeholder="Misal: Kabel Putus/Tersenggol">
    </div>
    <div class="form-group">
        <label>Manual Latitude</label>
        <input type="text" id="lat" placeholder="-7.xxxx">
    </div>
    <div class="form-group">
        <label>Manual Longitude</label>
        <input type="text" id="lon" placeholder="112.xxxx">
    </div>
    <div class="form-group">
        <label>Keterangan Tambahan</label>
        <textarea id="keterangan" rows="3"></textarea>
    </div>
    <div class="form-group">
        <label>Evidence Foto (Maks 10)</label>
        <input type="file" id="fotoInput" accept="image/*" multiple>
    </div>

    <div id="status">⏳ Sedang memproses...</div>
    <button id="btnSubmit" onclick="sendAllData()">SUBMIT DATA GAMAS</button>

    <script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = "8648713313:AAHOW_7a8ga1Rqe-d2HHhU6EVtJPrti3PRs";
        const CHANNEL_ID = "-1003759185457";
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxeAkZl8kgM9KYATer4C53fb3LsUuwa__RE7fpdDnkXOz6nR2TTsH2F8_LjvBUyOTCEwQ/exec';

        tg.expand();

        async function sendAllData() {
            const btn = document.getElementById('btnSubmit');
            const statusDiv = document.getElementById('status');
            const files = document.getElementById('fotoInput').files;
            
            if (!document.getElementById('tiket').value) return alert("Nomor Tiket wajib diisi!");
            if (files.length === 0) return alert("Minimal lampirkan 1 foto evidence!");
            
            btn.disabled = true;
            statusDiv.style.display = "block";

            try {
                // Keterangan lengkap untuk caption Album
                const tiketVal = document.getElementById('tiket').value;
                const definisiVal = document.getElementById('definisi').value;
                const penyebabVal = document.getElementById('penyebab').value;
                const latVal = document.getElementById('lat').value;
                const lonVal = document.getElementById('lon').value;
                const ketVal = document.getElementById('keterangan').value;
                const tglVal = document.getElementById('tanggal').value;

                const fullCaption = `⚠️ EVIDENCE GAMAS\n\n📌 Tiket: ${tiketVal}\n📂 Definisi: ${definisiVal}\n🛠️ Penyebab: ${penyebabVal}\n📍 Lokasi: ${latVal}, ${lonVal}\n📝 Ket: ${ketVal}`;

                // --- 1. PROSES KIRIM ALBUM KE TELEGRAM DULU ---
                statusDiv.innerText = `🚀 Mengirim Album (${files.length} Foto)...`;
                
                const formData = new FormData();
                formData.append('chat_id', CHANNEL_ID);

                let mediaArray = [];
                for (let i = 0; i < files.length; i++) {
                    const name = `foto${i}`;
                    formData.append(name, files[i]);
                    
                    mediaArray.push({
                        type: 'photo',
                        media: `attach://${name}`,
                        caption: i === 0 ? fullCaption : "" // Caption cuma di foto pertama biar rapi
                    });
                }
                formData.append('media', JSON.stringify(mediaArray));

                const responseTg = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup`, {
                    method: 'POST',
                    body: formData
                });

                if (!responseTg.ok) throw new Error("Gagal kirim album ke Telegram.");
                
                // Ambil ID pesan aslinya dari balasan Telegram
                const resultTg = await responseTg.json();
                const realMessageId = resultTg.result[0].message_id; // Ngambil ID dari foto pertama di album

                // --- 2. BARU SIMPAN DATA KE SPREADSHEET (GAS) ---
                statusDiv.innerText = "⏳ Menyimpan data ke Spreadsheet...";
                
                const data = {
                    action: 'submit_gamas',
                    tanggal: tglVal,
                    tiket: tiketVal,
                    definisi: definisiVal,
                    penyebab: penyebabVal,
                    lat: latVal,
                    lon: lonVal,
                    keterangan: ketVal,
                    albumUrl: `https://t.me/c/${CHANNEL_ID.replace("-100", "")}/${realMessageId}` // SEKARANG ID-NYA ASLI
                };
                
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });

                // --- 3. SELESAI ---
                statusDiv.innerText = "✅ Berhasil Terkirim!";
                setTimeout(() => tg.close(), 1500);

            } catch (e) {
                alert("Error: " + e.message);
                btn.disabled = false;
                statusDiv.style.display = "none";
            }
        }
    </script>
</body>
</html>
