<script>
        const tg = window.Telegram.WebApp;
        const BOT_TOKEN = "8648713313:AAHOW_7a8ga1Rqe-d2HHhU6EVtJPrti3PRs";
        const CHANNEL_ID = "-1003759185457";
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxeAkZl8kgM9KYATer4C53fb3LsUuwa__RE7fpdDnkXOz6nR2TTsH2F8_LjvBUyOTCEwQ/exec';

        tg.expand();

        async function sendAllData() {
            const btn = document.getElementById('btnSubmit');
            const statusDiv = document.getElementById('status');
            const files = document.getElementById('fotoInput').files;
            
            if (!document.getElementById('tiket').value) return alert("Nomor Tiket wajib diisi!");
            if (files.length === 0) return alert("Minimal lampirkan 1 foto evidence!");
            
            btn.disabled = true;
            statusDiv.style.display = "block";

            try {
                // 1. SIMPAN DATA KE SPREADSHEET (GAS)
                statusDiv.innerText = "⏳ Menyimpan data ke Spreadsheet...";
                const data = {
                    action: 'submit_gamas',
                    tanggal: document.getElementById('tanggal').value,
                    tiket: document.getElementById('tiket').value,
                    definisi: document.getElementById('definisi').value,
                    penyebab: document.getElementById('penyebab').value,
                    lat: document.getElementById('lat').value,
                    lon: document.getElementById('lon').value,
                    keterangan: document.getElementById('keterangan').value,
                    albumUrl: "Cek di Channel"
                };
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(data) });

                // 2. PROSES KIRIM ALBUM KE TELEGRAM
                statusDiv.innerText = "⏳ Menyiapkan Album Foto...";
                const formData = new FormData();
                formData.append('chat_id', CHANNEL_ID);

                // Keterangan lengkap untuk caption Album
                const fullCaption = `⚠️ EVIDENCE GAMAS\n\n📌 Tiket: ${data.tiket}\n📂 Definisi: ${data.definisi}\n🛠️ Penyebab: ${data.penyebab}\n📍 Lokasi: ${data.lat}, ${data.lon}\n📝 Ket: ${data.keterangan}`;

                let mediaArray = [];
                for (let i = 0; i < files.length; i++) {
                    const name = `foto${i}`;
                    formData.append(name, files[i]);
                    
                    mediaArray.push({
                        type: 'photo',
                        media: `attach://${name}`,
                        caption: i === 0 ? fullCaption : "" // Caption cuma di foto pertama biar rapi
                    });
                }

                formData.append('media', JSON.stringify(mediaArray));

                statusDiv.innerText = `🚀 Mengirim Album (${files.length} Foto)...`;
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMediaGroup`, {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    statusDiv.innerText = "✅ Berhasil Terkirim ke Channel!";
                    setTimeout(() => tg.close(), 1500);
                } else {
                    throw new Error("Gagal kirim album ke Telegram.");
                }

            } catch (e) {
                alert("Error: " + e.message);
                btn.disabled = false;
                statusDiv.style.display = "none";
            }
        }
    </script>
