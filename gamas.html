<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lapor Gamas</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #d32f2f; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h3>⚠️ Input Data Gamas</h3>
    <div class="form-group">
        <label>Tanggal Gamas</label>
        <input type="date" id="tanggal">
    </div>
    <div class="form-group">
        <label>Nomor Tiket</label>
        <input type="text" id="tiket" placeholder="Contoh: IN123456">
    </div>
    <div class="form-group">
        <label>Definisi Gamas</label>
        <select id="definisi">
            <option value="ODP">ODP</option>
            <option value="DISTRIBUSI">DISTRIBUSI</option>
            <option value="FEEDER">FEEDER</option>
        </select>
    </div>
    <div class="form-group">
        <label>Penyebab Gamas</label>
        <input type="text" id="penyebab" placeholder="Misal: Kabel Putus/Tersenggol">
    </div>
    <div class="form-group">
        <label>Manual Latitude</label>
        <input type="text" id="lat" placeholder="-7.xxxx">
    </div>
    <div class="form-group">
        <label>Manual Longitude</label>
        <input type="text" id="lon" placeholder="112.xxxx">
    </div>
    <div class="form-group">
        <label>Keterangan Tambahan</label>
        <textarea id="keterangan" rows="3"></textarea>
    </div>
    <p style="font-size: 11px; color: #666;">*Note: Evidence foto silakan kirim langsung ke Channel setelah mengisi form ini.</p>
    <button onclick="sendData()">SUBMIT DATA GAMAS</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        async function sendData() {
            const data = {
                action: 'submit_gamas',
                tanggal: document.getElementById('tanggal').value,
                tiket: document.getElementById('tiket').value,
                definisi: document.getElementById('definisi').value,
                penyebab: document.getElementById('penyebab').value,
                lat: document.getElementById('lat').value,
                lon: document.getElementById('lon').value,
                keterangan: document.getElementById('keterangan').value,
                albumUrl: "Cek di Channel"
            };

            // Kirim ke GAS
            await fetch('https://script.google.com/macros/s/AKfycbxeAkZl8kgM9KYATer4C53fb3LsUuwa__RE7fpdDnkXOz6nR2TTsH2F8_LjvBUyOTCEwQ/exec', {
                method: 'POST',
                body: JSON.stringify(data)
            });

            tg.close();
        }
    </script>
</body>
</html>
