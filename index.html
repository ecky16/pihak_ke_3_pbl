<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Survey Teknisi Pihak ke 3</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        html, body { height: 100%; margin: 0; padding: 0; }
        body { font-family: sans-serif; display: flex; flex-direction: column; }
        #controls { 
            padding: 15px; 
            background: #f8f9fa; 
            border-bottom: 1px solid #ddd; 
            display: flex; gap: 10px; 
            align-items: center; 
            flex-wrap: wrap; 
            z-index: 1000;
        }
        /* Pastikan ID MAP punya tinggi yang tetap */
        #map { 
            flex-grow: 1; 
            height: 100%; 
            width: 100%; 
        }
        .stats-box { background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; }
        select, input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="controls">
    <select id="selectTeknisi" onchange="renderMaps()">
        <option value="">-- Semua Teknisi --</option>
    </select>
    <input type="date" id="selectTanggal" onchange="renderMaps()">
    <button onclick="fetchData()">Refresh Data</button>
    
    <div class="stats-box" id="jarakTempuh">Total Jarak: 0 KM</div>
    <div class="stats-box" id="totalLaporan">Laporan: 0 Foto</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // URL Apps Script Mas Ecky
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxeAkZl8kgM9KYATer4C53fb3LsUuwa__RE7fpdDnkXOz6nR2TTsH2F8_LjvBUyOTCEwQ/exec';

    // Inisialisasi Map
    let map = L.map('map').setView([-7.2575, 112.7521], 13);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    let allData = [];
    let polylineGroup = L.featureGroup().addTo(map);
    let markerGroup = L.featureGroup().addTo(map);

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function fetchData() {
        try {
            const response = await fetch(GAS_URL);
            allData = await response.json();
            
            const select = document.getElementById('selectTeknisi');
            const valSebelumnya = select.value;
            
            const daftarNama = [...new Set(allData.map(item => item.Nama))];
            select.innerHTML = '<option value="">-- Semua Teknisi --</option>';
            daftarNama.forEach(nama => {
                const opt = document.createElement('option');
                opt.value = nama; opt.innerHTML = nama;
                select.appendChild(opt);
            });
            
            select.value = valSebelumnya;
            renderMaps();
        } catch (e) { console.error("Data Fetch Error:", e); }
    }

    function renderMaps() {
        const teknisiSel = document.getElementById('selectTeknisi').value;
        const tanggalSel = document.getElementById('selectTanggal').value;

        polylineGroup.clearLayers();
        markerGroup.clearLayers();

        let filtered = allData;
        if (teknisiSel) filtered = filtered.filter(d => d.Nama === teknisiSel);
        if (tanggalSel) {
            filtered = filtered.filter(d => new Date(d.Timestamp).toISOString().split('T')[0] === tanggalSel);
        }

        let totalLaporan = 0;
        let totalJarak = 0;
        const perUser = {};

        filtered.forEach((d, i) => {
            // Logika Foto
            if (d.Photo_URL && d.Photo_URL.includes('t.me/c/')) {
                totalLaporan++;
                let lat = d.Latitude, lon = d.Longitude;
                if (!lat || lat == 0) {
                    const lastPos = filtered.slice(0, i).reverse().find(r => r.Nama === d.Nama && r.Latitude != 0);
                    if (lastPos) { lat = lastPos.Latitude; lon = lastPos.Longitude; }
                }
                if (lat && lat != 0) {
                    L.marker([lat, lon]).addTo(markerGroup)
                     .bindPopup(`<b>Lap: ${d.Keterangan}</b><br><small>${d.Nama}</small><br><a href="${d.Photo_URL}" target="_blank">Lihat Foto</a>`);
                }
            }

            // Jalur
            if (d.Latitude && d.Longitude && d.Latitude != 0) {
                if (!perUser[d.Nama]) perUser[d.Nama] = [];
                perUser[d.Nama].push([d.Latitude, d.Longitude]);
            }
        });

        Object.keys(perUser).forEach(nama => {
            const coords = perUser[nama];
            if (coords.length > 1) {
                L.polyline(coords, {color: teknisiSel ? 'blue' : 'gray', weight: 3}).addTo(polylineGroup);
                for (let j = 1; j < coords.length; j++) {
                    totalJarak += calculateDistance(coords[j-1][0], coords[j-1][1], coords[j][0], coords[j][1]);
                }
            }
        });

        document.getElementById('totalLaporan').innerText = `Laporan: ${totalLaporan} Foto`;
        document.getElementById('jarakTempuh').innerText = `Total Jarak: ${totalJarak.toFixed(2)} KM`;
        
        if (filtered.length > 0) {
            const bounds = L.featureGroup([polylineGroup, markerGroup]).getBounds();
            if (bounds.isValid()) map.fitBounds(bounds);
        }
    }

    fetchData();
    setInterval(fetchData, 30000); 
</script>
</body>
</html>
